<head>
<style>
body {
  background-color: #f2eef7;
  color: #333333;
  font-family:
    "Arial",
    "Hiragino Sans",
    sans-serif;
  font-size: 14px;
  line-height: 1;

  height: 100vh;
  margin: 0;

  display: flex;
  justify-content: center;
  align-items: center;
}

.password-box {
  text-align: center;
}

h1 {
  font-size: 17px;
  font-weight: normal;
}

input {
  margin-top: 10px;
}

button {
  margin-top: 10px;
}

a {
  color: #4a4a8a;
  text-decoration: none;
}
  
#wolfgif {
  width: 250px;
  height: auto;
  margin-bottom: 20px;
  cursor: pointer; /* クリックできることが分かる */
}
</style>
</head>

<body>
<div class="password-box">
<img src="Dreamy_Wolf.gif" id=wolfgif alt="dreamy wolf">
<audio id="bgm" loop>
  <source src="Dreamy_Wolf_sound.m4a">
</audio>
  
<p>enter password</p>
<input type="password" id="password">
<button onclick="checkPassword()">Enter</button>
<br><br>
<p><a href="index.html">Home</a></p>
</div>
</body>


<script>
const PASSWORD = "entredeux";

function checkPassword() {
  const input = document.getElementById("password").value;

  if (input === PASSWORD) {
    sessionStorage.setItem("authenticated", "true");
    window.location.href = "blog.html";
  } else {
    alert("Password is incorrect.");
  }
}

const gif = document.getElementById("wolfgif");
const bgm = document.getElementById("bgm");

gif.addEventListener("click", () => {
  if (bgm.paused) {
    bgm.play();
  } else {
    bgm.pause();
  }
});

</script>

</body>
